# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/capability_map_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CapabilityMap

# Name for the device event map
name: OneXPlayer Apex

# Unique identifier of the capability mapping
id: oxp_apex

# List of mapped events that are activated by a specific set of activation keys.
mapping:
  # Turbo button (Home/Steam button) sends LCtrl+LAlt+LGUI
  - name: Turbo
    source_events:
      - keyboard: KeyLeftCtrl
      - keyboard: KeyLeftAlt
      - keyboard: KeyLeftMeta
    target_event:
      gamepad:
        button: QuickAccess

  # KB button (short press) sends RCtrl+LGUI+O
  - name: KB (Short Press)
    source_events:
      - keyboard: KeyRightCtrl
      - keyboard: KeyLeftMeta
      - keyboard: KeyO
    target_event:
      gamepad:
        button: Keyboard

  # Orange button sends LGUI+G (opens Steam menu / left side panel)
  - name: Orange Button
    source_events:
      - keyboard: KeyLeftMeta
      - keyboard: KeyG
    target_event:
      gamepad:
        button: Guide

  # Turbo + Orange sends LGUI+SysRq
  - name: Turbo + Orange Button
    source_events:
      - keyboard: KeyLeftMeta
      - keyboard: KeySysrq
    target_event:
      gamepad:
        button: Screenshot

  # KB + Orange sends RCtrl+RAlt+Delete
  - name: KB + Orange Button
    source_events:
      - keyboard: KeyRightCtrl
      - keyboard: KeyRightAlt
      - keyboard: KeyDelete
    target_event:
      keyboard: KeyF16

  # Back paddle M1 (right) - after firmware remap sends F14
  - name: M1 (Right Back Paddle)
    source_events:
      - keyboard: KeyF14
    target_event:
      gamepad:
        button: RightPaddle1

  # Back paddle M2 (left) - after firmware remap sends F13
  - name: M2 (Left Back Paddle)
    source_events:
      - keyboard: KeyF13
    target_event:
      gamepad:
        button: LeftPaddle1

# List of events to filter from the source devices
filtered_events: []
